# scripts/paperless-config.yaml
# Single source of truth for Paperless-ngx taxonomy.
#
# Managed by the /paperless-update Claude Code command.
#   Pull (live → YAML):  /paperless-update --pull
#   Push (YAML → live):  /paperless-update
#   Dry-run preview:     /paperless-update --dry-run
#
# Rules:
#   - Never edit bootstrap.sh or paperless-ai-next/.env for taxonomy changes — edit here.
#   - pipeline_tag: true  → excluded from AI PROMPT_TAGS list.
#   - ai_hint            → compiled and appended to SYSTEM_PROMPT for paperless-ai-next.
#   - document_types[].custom_fields → auto-generates "[auto] Attach fields:" workflow.
#
# Last pulled: 2026-04-07

# ── Tags ───────────────────────────────────────────────────────────────────────

tags:

  # Hierarchy: Finance
  - name: Finance
    color: "#808080"
    children:
      - name: Tax
        ai_hint: >
          Assign for tax returns, assessments, Steuerbescheid, or any correspondence
          from Finanzamt (Austrian/German tax authority).
      - name: Insurance
        ai_hint: >
          Assign for insurance policies, premium notices, claims, or correspondence
          from any insurance provider.
      - name: Banking
        ai_hint: >
          Assign for bank statements, account letters, IBAN notices, or correspondence
          from banks or financial institutions.

  # Hierarchy: Housing
  - name: Housing
    color: "#808080"
    children:
      - name: Rent
        ai_hint: "Assign for rent invoices, rental agreements, or landlord correspondence."
      - name: Utilities
        ai_hint: >
          Assign for electricity, gas, water, internet, or phone bills
          (utility providers).

  # Hierarchy: Health
  - name: Health
    color: "#808080"
    children:
      - name: Medical
        ai_hint: >
          Assign for general medical invoices, doctor letters, lab results,
          or health-related documents not specific to a family member.
      - name: Dental
        ai_hint: "Assign for dental invoices, treatment plans, or dental correspondence."
      - name: health-xnc
        ai_hint: >
          Assign when the document is a medical invoice, receipt, prescription,
          or letter specifically concerning a child (XNC). Look for a child's name
          or pediatric references.
      - name: health-ms
        ai_hint: "Assign when the document concerns health matters for MS."
      - name: health-po
        ai_hint: "Assign when the document concerns health matters for PO."

  # Hierarchy: Car
  - name: Car
    color: "#808080"
    children:
      - name: Car Insurance
        ai_hint: "Assign for car insurance policies, renewal notices, or claims."
      - name: Service
        ai_hint: "Assign for vehicle service invoices, MOT certificates, or repair bills."

  # Hierarchy: Work
  - name: Work
    color: "#808080"
    children:
      - name: Payslip
        ai_hint: "Assign for salary slips, pay stubs, Lohnzettel, or payroll documents."
      - name: Employment
        ai_hint: >
          Assign for employment contracts, HR letters, termination notices,
          or official employer correspondence.

  # Standalone tags
  - name: Bank
  - name: School
    ai_hint: "Assign for school reports, correspondence from schools, or education-related documents."
  - name: Munster
  - name: Hoflein
    ai_hint: "Assign for documents related to Hoflein an der Donau."
  - name: Heinl
  - name: Altenberg
    matching_algorithm: literal
    match: "St. Andra-Wörden"
    is_insensitive: true
    ai_hint: >
      Assign when the document relates to the municipality of Altenberg,
      the village of St. Andrä-Wördern, Marktgemeinde St. Andrä-Wördern,
      or addresses in Hoflein.

  # Patient tags — used for XNC medical docs to identify which child.
  - name: X
    matching_algorithm: literal
    match: "Xander"
    is_insensitive: true
    ai_hint: "Assign to XNC medical documents where the patient is Xander."
  - name: C
    matching_algorithm: literal
    match: "Cassian"
    is_insensitive: true
    ai_hint: "Assign to XNC medical documents where the patient is Cassian."
  - name: N
    matching_algorithm: literal
    match: "Nathaniel"
    is_insensitive: true
    ai_hint: "Assign to XNC medical documents where the patient is Nathaniel."

  # ── Pipeline tags — excluded from AI PROMPT_TAGS ──────────────────────────
  # These are workflow control tags; the AI must never self-assign them.
  - name: ocr-pending
    pipeline_tag: true
    matching_algorithm: any_word
    match: ""
  - name: classification-pending
    pipeline_tag: true
  - name: processed
    pipeline_tag: true

# ── Document types ─────────────────────────────────────────────────────────────
# custom_fields: lists field names (defined in custom_fields section below).
# The command auto-generates an "[auto] Attach fields:" workflow for each type
# that has a non-empty custom_fields list.

document_types:
  - name: Invoice
    custom_fields:
      - Amount
      - Paid
      - PaidOn
      - PaidBy
      - PaidWith
      - InvoiceNr

  - name: Contract

  - name: Receipt
    custom_fields:
      - Amount
      - Paid

  - name: Certificate

  - name: Statement

  - name: Letter

  - name: Manual

  - name: Payslip

  - name: XNC medical
    # Kids' medical invoices — submitted to OEGKK and Allianz for reimbursement.
    # The AI applies patient tag (X/C/N), sets Treatment date and Amount automatically.
    custom_fields:
      - Amount
      - Paid
      - PaidOn
      - PaidBy
      - PaidWith
      - InvoiceNr
      - Treatment date
      - Submitted OEGKK
      - Submitted Allianz
      - Reimbursed OEGKK
      - Reimbursed Allianz

  # ── Types pulled from live — not in original YAML ─────────────────────────
  - name: Anonymverfügung

  - name: Legal Document

  - name: List of Standards

  - name: Order confirmation

  - name: Weather Data

# ── Custom fields ──────────────────────────────────────────────────────────────
# Global entity definitions. Created in Paperless-ngx as global custom fields.
# Association to document types is enforced via auto-generated workflows.
# data_type: select | string | longtext | date | monetary | integer | float | url | boolean

custom_fields:
  - name: Status
    data_type: select
    select_options:
      - label: Inbox
      - label: Action needed
      - label: Waiting
      - label: Done

  - name: Amount
    data_type: monetary

  - name: Paid
    data_type: boolean

  - name: PaidOn
    data_type: date

  - name: PaidBy
    data_type: select
    select_options:
      - label: Marcus
      - label: Sabrina
      - label: Sofiia

  # Free text — record which bank account or payment method was used.
  - name: PaidWith
    data_type: string   # API value is "string" not "text"; also valid: longtext

  # Invoice/document number from the original document.
  - name: InvoiceNr
    data_type: string

  # Treatment date for XNC medical docs — extracted by AI from invoice.
  - name: Treatment date
    data_type: date

  - name: Submitted OEGKK
    data_type: date

  - name: Submitted Allianz
    data_type: date

  - name: Reimbursed OEGKK
    data_type: date

  - name: Reimbursed Allianz
    data_type: date

# ── Workflows ──────────────────────────────────────────────────────────────────
# User-defined workflows only. [auto] Attach fields: workflows are generated
# automatically from document_types[].custom_fields — do not add them here.
#
# Trigger types: consumption_started | document_added | document_updated | document_deleted
# Action types:  assign_tag | assign_correspondent | assign_document_type |
#                webhook | assign_view | assign_custom_field | remove_tag | email
# Matching algorithm: none | any_word | all_words | literal | regex | fuzzy | auto

workflows:

  - name: Auto Vision OCR
    order: 1
    enabled: true
    triggers:
      - type: document_added
        sources: ["1", "2", "3"]
        matching_algorithm: none
        filter_has_tags: []
        filter_has_all_tags: []
        filter_has_not_tags: []
    actions:
      - type: assign_tag
        assign_tags:
          - ref: ocr-pending              # resolved to numeric ID at runtime

  - name: Remove classification-pending after processing
    order: 10
    enabled: true
    triggers:
      - type: document_updated
        sources: ["1", "2", "3"]
        matching_algorithm: none
        filter_has_tags: []
        filter_has_all_tags:
          - ref: processed             # fires when paperless-ai-next marks doc as done
        filter_has_not_tags: []
    actions:
      - type: removal
        remove_tags:
          - ref: classification-pending  # clean up the trigger tag

  - name: AI Classification after OCR
    order: 2
    enabled: true
    triggers:
      - type: document_updated
        sources: ["1", "2", "3"]
        matching_algorithm: none
        filter_has_tags: []
        filter_has_all_tags:
          - ref: classification-pending   # fires when classification-pending tag is applied
        filter_has_not_tags: []
    actions:
      - type: webhook
        webhook:
          url: "http://paperless-ai-next:3000/api/webhook/document"
          use_params: false
          as_json: false
          params: null
          body: '{"doc_url": "{{ doc_url }}"}'
          headers:
            Content-Type: "application/json"
            x-api-key: "${PAPERLESS_AI_NEXT_API_KEY}"
          include_document: false

# ── Saved views ────────────────────────────────────────────────────────────────
# filter_rules rule_type integers (Paperless-ngx constants):
#   17 = custom field value equals
# WARNING: none of these views exist in live Paperless yet.
# Run /paperless-update to create them (requires Status custom field to exist first).

saved_views:
  - name: Inbox
    sort_field: created
    sort_reverse: true
    show_on_dashboard: true
    show_in_sidebar: true
    filter_rules:
      - rule_type: 17
        value: "Inbox"
        custom_field: Status    # resolved to numeric ID at runtime

  - name: Action needed
    sort_field: created
    sort_reverse: false
    show_on_dashboard: true
    show_in_sidebar: true
    filter_rules:
      - rule_type: 17
        value: "Action needed"
        custom_field: Status

  - name: Waiting
    sort_field: created
    sort_reverse: false
    show_on_dashboard: true
    show_in_sidebar: true
    filter_rules:
      - rule_type: 17
        value: "Waiting"
        custom_field: Status

  # XNC Medical workflow views — track kids' medical invoice reimbursement state.
  # Uses Status field + doc type XNC medical (rule_type 3).
  # Workflow: Incoming (Status=Inbox) → Submitted (Status=Waiting) → Reimbursed (Status=Done)
  - name: "XNC Medical: Incoming"
    sort_field: created
    sort_reverse: true
    show_on_dashboard: false
    show_in_sidebar: true
    filter_rules:
      - rule_type: 3
        value: "XNC medical"    # doc type filter — resolved to ID at runtime
      - rule_type: 17
        value: "Inbox"
        custom_field: Status

  - name: "XNC Medical: Submitted"
    sort_field: created
    sort_reverse: false
    show_on_dashboard: false
    show_in_sidebar: true
    filter_rules:
      - rule_type: 3
        value: "XNC medical"
      - rule_type: 17
        value: "Waiting"
        custom_field: Status

  # Pipeline monitoring views — track documents moving through OCR/AI stages.
  - name: "OCR Pending"
    sort_field: added
    sort_reverse: false
    show_on_dashboard: false
    show_in_sidebar: true
    filter_rules:
      - rule_type: 6
        value: "26"   # tag ID: ocr-pending

  - name: "Classification Pending"
    sort_field: added
    sort_reverse: false
    show_on_dashboard: false
    show_in_sidebar: true
    filter_rules:
      - rule_type: 6
        value: "27"   # tag ID: classification-pending

  - name: "Processed"
    sort_field: created
    sort_reverse: true
    show_on_dashboard: false
    show_in_sidebar: true
    filter_rules:
      - rule_type: 6
        value: "28"   # tag ID: processed

  - name: "XNC Medical: Reimbursed"
    sort_field: created
    sort_reverse: false
    show_on_dashboard: false
    show_in_sidebar: true
    filter_rules:
      - rule_type: 3
        value: "XNC medical"
      - rule_type: 17
        value: "Done"
        custom_field: Status

# ── AI classification ──────────────────────────────────────────────────────────
# Compiled into paperless-ai-next/.env as SYSTEM_PROMPT and PROMPT_TAGS.
# Per-tag ai_hint entries above are injected as a supplementary "Tag assignment rules:"
# block AFTER the system_prompt_base — so hints extend rather than replace the base.
#
# NOTE: The base prompt below already contains some inline per-tag rules
# (Altenberg locality, XNC medical conditional block). These were adopted from
# the existing live SYSTEM_PROMPT on pull 2026-04-07. You may refactor them into
# ai_hint fields over time, but check for duplicates before doing so.

ai_classification:
  system_prompt_base: |
    You are a personalized document analyzer. Your task is to analyze documents and extract relevant information. Documents may be in German or English.

    Rules for tags:
    - You will be given a list of allowed tags — use ONLY tags from that list
    - Use the EXACT tag name as given — NEVER translate tags into the document language
    - Use only relevant tags
    - Maximum 4 tags per document, fewer if sufficient
    - Do not use dates, years, or cities as tags
    - Locality mappings (apply these tags when the document involves these places/institutions):
      - "Altenberg": any document from or mentioning "Marktgemeinde St. Andra-Wörden", "St. Andra-Wörden", or "Altenberg"

    Rules for correspondent:
    - Identify the sender, company, or institution the document originates from
    - Use ONLY the name — exclude addresses, reference numbers, account numbers, and any other text

    Rules for document_type:
    - Use ONLY these exact document types (case-sensitive): Invoice, Contract, Receipt, Certificate, Statement, Letter, Manual, Payslip, XNC medical, Anonymverfügung, Legal Document, List of Standards, Order confirmation, Weather Data
    - NEVER invent or translate document type names — pick the closest match from the list above
    - A "Honorarnote", "Arztrechnung", or "Rechnung" is an "Invoice"
    - A "Vertrag" is a "Contract"; a "Brief" is a "Letter"; a "Kontoauszug" is a "Statement"
    - If no type fits, omit it rather than invent one

    Rules for title:
    - Short and concise
    - No addresses
    - Should describe the document content meaningfully
    - Use the document language

    ---

    CONDITIONAL RULES FOR KIDS MEDICAL DOCUMENTS ONLY:
    The following rules ONLY apply if the document concerns a child patient (Xander, Cassian, or Nathaniel). This includes: medical invoices, Arztrechnung, Honorarnote, Laborbefund, therapy receipts, referrals (Überweisung), prescriptions (Verordnung, Rezept), doctor letters, examination results, or ANY document from a pediatric doctor or children's hospital where the patient is one of the three children. For all other documents, IGNORE these rules entirely and do NOT set these custom fields.

    If kids medical document:
    - Set document_type to "XNC medical"
    - Find the patient name on the document. Look for: "Patient:", "Name des Patienten:", "Rechnungsempfänger:", "Patient(in):", the name in the salutation ("Sehr geehrte Eltern von ..."), or any name that is clearly the child receiving treatment. The patient is one of three children: Xander, Cassian, or Nathaniel.
      - If the patient name contains "Xander", apply tag "X"
      - If the patient name contains "Cassian", apply tag "C"
      - If the patient name contains "Nathaniel", apply tag "N"
      - You MUST apply exactly one of X, C, or N — never skip this step for XNC medical documents.
    - Also apply tag "health-xnc"
    - Custom fields (ONLY for these documents):
      - Treatment date: Extract the date of treatment/service (Behandlungsdatum, Leistungsdatum, Ordinationsdatum). If multiple dates, use the most recent. ALWAYS format as YYYY-MM-DD (e.g. 2026-02-21). NEVER use DD.MM.YYYY or any other format. If you are not certain of the exact date, omit this field entirely — do not guess.
      - Amount: Extract the total amount (Gesamtbetrag, Honorar, Rechnungsbetrag). Only set if an amount is clearly present. ALWAYS format as EUR followed by the amount with a dot as decimal separator and exactly two decimal places (e.g. EUR250.00). NEVER use a comma as decimal separator. NEVER omit the EUR prefix. If you are not certain of the exact amount, omit this field entirely — do not guess.
    - Title format: [X/C/N] - [Doctor/Practice] - [short description]
      Example: C - Dr. Müller - Kontrolluntersuchung
      Example: X - Dr. HOLUB - Überweisung Kinderarzt
