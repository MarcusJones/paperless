# compose.yaml — Paperless-ngx + AI pipeline
#
# Ports:
#   8000  paperless-ngx     — web UI + REST API
#   3000  paperless-ai-next — AI classification dashboard + webhook
#   8080  paperless-gpt     — vision OCR UI
#   9999  dozzle            — container log viewer
#   3001  open-webui        — Ollama model management
#  11434  ollama            — LLM API (also accessible within stack as http://ollama:11434)
#
# Ollama runs as a service in this stack with nvidia GPU passthrough.
#
# Secrets come from the root .env file (gitignored). Non-secret config lives in
# each service's own <service>/.env file (committed).
#
# Usage:
#   docker compose up -d          — start full stack
#   docker compose down           — stop and remove containers (data preserved)
#   docker compose logs -f        — tail all logs
#   docker compose exec paperless python3 manage.py <cmd>

name: paperless

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - ./redis/data:/data

  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file: ./postgres/.env
    environment:
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data

  tika:
    image: apache/tika:latest
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"

  # ── Core — Paperless-ngx ────────────────────────────────────────────────────

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
      - tika
      - gotenberg
    ports:
      - "8000:8000"
    env_file: ./paperless/.env
    environment:
      # Secrets injected from root .env
      PAPERLESS_SECRET_KEY: ${SECRET_KEY}
      PAPERLESS_DBPASS: ${PG_PASSWORD}
    volumes:
      # All bind-mounts use relative paths — data is inspectable with ls/du
      - ./paperless/data:/usr/src/paperless/data
      - ./paperless/media:/usr/src/paperless/media
      - ./paperless/export:/usr/src/paperless/export
      # consume/ should be a symlink to your Dropbox folder:
      #   ln -s /mnt/c/Users/<you>/Dropbox/paperless-consume ./paperless/consume
      - ./paperless/consume:/usr/src/paperless/consume
    healthcheck:
      # The login page confirms Django + DB are up; no API token needed
      test: ["CMD-SHELL", "curl -f http://localhost:8000/accounts/login/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── AI Pipeline ─────────────────────────────────────────────────────────────

  paperless-ai-next:
    # Fork of paperless-ai with retry queues and better error handling.
    # Setup wizard required once: http://localhost:3000/setup
    # Dashboard: http://localhost:3000/dashboard
    # Webhook endpoint: POST http://paperless-ai-next:3000/api/webhook/document
    image: admonstrator/paperless-ai-next:latest
    restart: unless-stopped
    depends_on:
      paperless:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "3000:3000"
    env_file: ./paperless-ai-next/.env
    environment:
      # Secrets injected from root .env
      PAPERLESS_TOKEN: ${PAPERLESS_API_TOKEN}
      API_KEY: ${PAPERLESS_AI_NEXT_API_KEY}
    volumes:
      - ./paperless-ai-next/data:/app/data

  paperless-gpt:
    # Vision OCR: watches for `paperless-gpt-ocr-auto` tag, runs qwen2.5vl:7b,
    # then adds `ai-process` tag to trigger AI classification.
    # UI: http://localhost:8080
    image: icereed/paperless-gpt:latest
    restart: unless-stopped
    depends_on:
      paperless:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "8080:8080"
    env_file: ./paperless-gpt/.env
    environment:
      # Secret injected from root .env
      PAPERLESS_API_TOKEN: ${PAPERLESS_API_TOKEN}
    volumes:
      - ./paperless-gpt/prompts:/app/prompts

  # ── LLM ─────────────────────────────────────────────────────────────────────

  ollama:
    # LLM server — serves qwen3:14b (classify) and qwen2.5vl:7b (vision OCR).
    # OLLAMA_MAX_LOADED_MODELS=1 enforces sequential model use (12GB VRAM limit).
    # Models persist in ./ollama/data — re-pull after first run if directory is empty:
    #   docker compose exec ollama ollama pull qwen3:14b
    #   docker compose exec ollama ollama pull qwen2.5vl:7b
    # API: http://localhost:11434 (host) or http://ollama:11434 (within stack)
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      OLLAMA_MAX_LOADED_MODELS: "1"
    volumes:
      - ./ollama/data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Monitoring & Management ─────────────────────────────────────────────────

  open-webui:
    # Ollama model management and prompt testing UI.
    # URL: http://localhost:3001
    # First run: pull qwen3:14b and qwen2.5vl:7b via Models → Pull
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "3001:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "false"
    volumes:
      - ./open-webui/data:/app/backend/data

  dozzle:
    # Real-time log viewer for all containers.
    # URL: http://localhost:9999
    # Tip: use the "All containers" group or create a custom group for the AI pipeline.
    image: amir20/dozzle:latest
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      # Read-only Docker socket — Dozzle reads logs, never modifies containers
      - /var/run/docker.sock:/var/run/docker.sock:ro

  gpu-monitor:
    # Emits one JSON line every 10s with VRAM usage and GPU utilisation — visible in Dozzle.
    # Example: {"vram_used_mb":4521,"vram_total_mb":12288,"gpu_util_pct":72}
    image: nvidia/cuda:12.6.0-base-ubuntu22.04
    restart: unless-stopped
    entrypoint: []
    command:
      - sh
      - -c
      - |
        while true; do
          nvidia-smi --query-gpu=memory.used,memory.total,utilization.gpu \
            --format=csv,noheader,nounits \
            | awk -F', ' '{printf "{\"vram_used_mb\":%s,\"vram_total_mb\":%s,\"gpu_util_pct\":%s}\n", $1, $2, $3}'
          sleep 10
        done
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  pipeline-timing:
    # Merges logs from the three AI pipeline containers and emits per-document
    # stage timing — visible in Dozzle at :9999 alongside all other services.
    # Example: [2026-04-06 17:03:55]  DOC #5      Ingest: 4s  VisionOCR: 47s (3pg, 15s/pg)  Swap: 12s  Classify: 18s  TOTAL: 81s
    image: docker:cli
    restart: unless-stopped
    depends_on:
      paperless:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./scripts:/scripts:ro
    environment:
      COMPOSE_PROJECT_NAME: paperless
    entrypoint: []
    command:
      - sh
      - -c
      - "apk add --quiet --no-progress gawk >/dev/null 2>&1 && exec /scripts/pipeline-timing-container.sh"
